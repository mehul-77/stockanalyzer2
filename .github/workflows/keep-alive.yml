name: Keep Streamlit App Alive

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          curl -s -w "\nHTTP Status: %{http_code}\n" https://sentistockai.streamlit.app/ > /dev/null
          echo "Streamlit app pinged successfully at $(date)"
