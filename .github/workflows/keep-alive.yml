name: Keep Streamlit App Alive

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          curl -I --max-time 30 \
            -H "User-Agent: GitHub-Actions-Keep-Alive" \
            https://sentistockai.streamlit.app/ || true
          echo "Keep-alive ping completed at $(date)"
        continue-on-error: true
